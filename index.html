<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED ED THRIVE R.A. - Medical Portal</title>
    <style>
        /* AAPKA ORIGINAL CSS - KOI CHANGE NAHI */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-container { width: 100%; max-width: 450px; background: #ffffff; border-radius: 28px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 25px; }
        .card { background: #f0f9ff; border: 1px solid #e0f2fe; padding: 20px; border-radius: 18px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); background-color: #ffffff; }
        
        /* NAYA INTERACTIVE MODAL CSS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; width: 90%; max-width: 400px; border-radius: 28px; text-align: center; max-height: 80vh; overflow-y: auto; }
        .btn-menu { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #0284c7; color: white; border: none; border-radius: 15px; font-weight: 600; cursor: pointer; }
        .btn-back { background: #64748b; margin-top: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>MED ED THRIVE R.A.</h1></div>
    <div class="grid">
        <div class="card" onclick="openModal('surgical')">🩺<br>Surgical Procedures</div>
        <div class="card" onclick="openModal('equipment')">🔬<br>Medical Equipment</div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content" id="modalData"></div>
</div>

<script>
    function openModal(type) {
        let modal = document.getElementById('modal');
        let data = document.getElementById('modalData');
        modal.style.display = 'flex';
        
        if(type === 'surgical') {
            data.innerHTML = `<h3>Surgical Procedures</h3>
                <button class="btn-menu" onclick="alert('Cardio Procedures List Here')">Cardio O.T.</button>
                <button class="btn-menu" onclick="alert('Laparo Procedures List Here')">Laparo O.T.</button>
                <button class="btn-menu" onclick="alert('Gynaec Procedures List Here')">Gynaec O.T.</button>
                <button class="btn-menu" onclick="alert('Neuro Procedures List Here')">Neuro O.T.</button>
                <button class="btn-menu" onclick="alert('Ortho Procedures List Here')">Ortho O.T.</button>
                <button class="btn-menu btn-back" onclick="document.getElementById('modal').style.display='none'">Close</button>`;
        } else {
            data.innerHTML = `<h3>Medical Equipment</h3>
                <button class="btn-menu" onclick="alert('Autoclave, ETO, Ultrasonic')">Sterilization Zone</button>
                <button class="btn-menu">Store Lobby</button>
                <button class="btn-menu">Washing Area</button>
                <button class="btn-menu btn-back" onclick="document.getElementById('modal').style.display='none'">Close</button>`;
        }
    }
</script>

</body>
</html>
