<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED ED THRIVE R.A. - Medical Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-container { width: 100%; max-width: 450px; background: #ffffff; border-radius: 28px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        .header { margin-bottom: 30px; }
        .logo-placeholder { width: 95px; height: 95px; background: #a7f3d0; background: linear-gradient(135deg, #7dd3fc, #0284c7); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; color: white; box-shadow: 0 8px 20px rgba(2, 132, 199, 0.2); }
        h1 { font-size: 24px; color: #0f172a; margin-bottom: 12px; font-weight: 700; letter-spacing: -0.5px; text-transform: uppercase; }
        .subtitle { font-size: 14px; color: #64748b; line-height: 1.6; max-width: 90%; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 25px; }
        .card { background: #f0f9ff; border: 1px solid #e0f2fe; padding: 20px; border-radius: 18px; text-align: center; transition: 0.3s ease; }
        .card:hover { transform: translateY(-3px); border-color: #7dd3fc; background-color: #ffffff; box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        .card-icon { font-size: 30px; margin-bottom: 10px; display: block; }
        .card-title { font-size: 14px; font-weight: 600; color: #1e293b; line-height: 1.3; }
        .btn { display: block; width: 100%; background: #0f4c81; background: linear-gradient(135deg, #1e40af, #034675); color: white; text-align: center; padding: 16px; border-radius: 16px; font-weight: 600; text-decoration: none; margin-top: 30px; box-shadow: 0 6px 18px rgba(30, 64, 175, 0.2); transition: 0.3s; font-size: 16px; }
        .btn:hover { opacity: 0.95; transform: translateY(-2px); }
        .footer { text-align: center; margin-top: 40px; font-size: 12px; color: #94a3b8; border-top: 1px solid #f1f5f9; padding-top: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo-placeholder">M</div>
        <h1>MED ED THRIVE R.A.</h1>
        <p class="subtitle">Your Digital Guide to Medical Education, Surgical Procedures, and Healthcare Insights.</p>
    </div>

    <div class="grid">
        <div class="card">
            <span class="card-icon">🩺</span>
            <span class="card-title">Surgical Procedures</span>
        </div>
        <div class="card">
            <span class="card-icon">🔬</span>
            <span class="card-title">Medical Equipment</span>
        </div>
        <div class="card">
            <span class="card-icon">📚</span>
            <span class="card-title">Education Library</span>
        </div>
        <div class="card">
            <span class="card-icon">🧑‍⚕️</span>
            <span class="card-title">Patient Care</span>
        </div>
    </div>

    <a href="#" class="btn">Explore All Content</a>

    <div class="footer">
        MED ED THRIVE R.A. • Medical Portal
    </div>
</div>

</body>
</html>
