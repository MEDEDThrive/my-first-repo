<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED ED THRIVE R.A.</title>
    <style>
        /* [AAPKA ORIGINAL CSS YAHAN RAKHEIN] */
        body { font-family: sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 450px; background: #ffffff; border-radius: 28px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 25px; }
        .card { background: #f0f9ff; border: 1px solid #e0f2fe; padding: 20px; border-radius: 18px; cursor: pointer; }
        
        /* Modal Design - Jo aapne 146857.jpg mein dekha */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .btn-option { display: block; width: 100%; padding: 15px; margin: 8px 0; background: #0284c7; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-close { background: #64748b; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>MED ED THRIVE R.A.</h1>
    <div class="grid">
        <div class="card" onclick="showModal('surgical')">🩺<br>Surgical Procedures</div>
        <div class="card" onclick="showModal('equipment')">🔬<br>Medical Equipment</div>
    </div>
</div>

<div id="mainModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
    function showModal(type) {
        let modal = document.getElementById('mainModal');
        let body = document.getElementById('modalBody');
        modal.style.display = 'flex';
        
        if(type === 'surgical') {
            body.innerHTML = `<h3>Surgical Procedures</h3>
                <button class="btn-option">Cardio O.T.</button>
                <button class="btn-option">Laparo O.T.</button>
                <button class="btn-option">Gynaec O.T.</button>
                <button class="btn-option">Neuro O.T.</button>
                <button class="btn-option">Ortho O.T.</button>
                <button class="btn-option btn-close" onclick="closeModal()">Close</button>`;
        } else {
            body.innerHTML = `<h3>Medical Equipment</h3>
                <button class="btn-option">Sterilization Zone</button>
                <button class="btn-option">Store Lobby</button>
                <button class="btn-option">Washing Area</button>
                <button class="btn-option">Sterilization Zhon</button>
                <button class="btn-option btn-close" onclick="closeModal()">Close</button>`;
        }
    }
    function closeModal() { document.getElementById('mainModal').style.display = 'none'; }
</script>

</body>
</html>
