<!-- Is code ko apni file mein replace karein -->
<script>
    function openModal(type) {
        let modal = document.getElementById('mainModal');
        let content = document.getElementById('modalData');
        modal.style.display = 'flex';
        
        if(type === 'surgical') {
            content.innerHTML = `<h3>Surgical Procedures</h3>
                <button class="sub-btn" onclick="showSurgeryList('Cardio')">Cardio O.T.</button>
                <button class="sub-btn" onclick="showSurgeryList('Laparo')">Laparo O.T.</button>
                <button class="sub-btn" onclick="showSurgeryList('Gynaec')">Gynaec O.T.</button>
                <button class="sub-btn" onclick="showSurgeryList('Neuro')">Neuro O.T.</button>
                <button class="sub-btn" onclick="showSurgeryList('Ortho')">Ortho O.T.</button>
                <button class="sub-btn" style="background:#64748b" onclick="closeModal()">Close</button>`;
        } else if(type === 'equipment') {
            content.innerHTML = `<h3>Medical Equipment</h3>
                <button class="sub-btn" onclick="showSterilization()">Sterilization Zone</button>
                <button class="sub-btn">Store Lobby</button>
                <button class="sub-btn">Washing Area</button>
                <button class="sub-btn">Sterilization Zhon</button>
                <button class="sub-btn" style="background:#64748b" onclick="closeModal()">Close</button>`;
        }
    }

    // Surgical List dikhane ka function
    function showSurgeryList(otType) {
        let content = document.getElementById('modalData');
        let list = "";
        
        if(otType === 'Cardio') {
            list = "CABG, H.V.S, C.H.S, C.D.I, Aneurysm Repair, Heart Transplant, M.I.H.S";
        } else if(otType === 'Laparo') {
            list = "Laparoscopic Cholecystectomy, Appendectomy, Hernia Repair, Gynaecology, Bariatric Surgery";
        } else if(otType === 'Gynaec') {
            list = "Pelvic Repair, Hysterectomy, LSCS, D&C, Tubal Ligation, Myomectomy";
        } else if(otType === 'Neuro') {
            list = "Brain Tumor Resection, Aneurysm Clipping, VP Shunt, DBS, Microdiscectomy, Spinal Fusion";
        } else if(otType === 'Ortho') {
            list = "ORIF, External Fixation, Total Knee Replacement, THR, Shoulder Replacement, ACL, MCL";
        }

        content.innerHTML = `<h3>${otType} Procedures</h3>
            <p style="padding:10px; font-size:14px; color:#334155;">${list}</p>
            <button class="sub-btn" style="background:#64748b" onclick="openModal('surgical')">Back</button>`;
    }

    function showSterilization() {
        document.getElementById('modalData').innerHTML = `<h3>Sterilization Options</h3>
            <button class="sub-btn">Autoclave Machine</button>
            <button class="sub-btn">ETO Machine</button>
            <button class="sub-btn">Ultrasonic Machine</button>
            <button class="sub-btn" style="background:#64748b" onclick="openModal('equipment')">Back</button>`;
    }

    function closeModal() { document.getElementById('mainModal').style.display = 'none'; }
</script>
