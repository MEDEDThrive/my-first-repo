<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED ED THRIVE R.A. - Medical Portal</title>
    <style>
        /* AAPKA PURANA DESIGN - BILKUL WAHI */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #f1f5f9; color: #1e293b; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-container { width: 100%; max-width: 450px; background: #ffffff; border-radius: 28px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        .header { margin-bottom: 30px; }
        .logo-placeholder { width: 95px; height: 95px; background: linear-gradient(135deg, #7dd3fc, #0284c7); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; color: white; box-shadow: 0 8px 20px rgba(2, 132, 199, 0.2); }
        h1 { font-size: 24px; color: #0f172a; margin-bottom: 12px; font-weight: 700; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 25px; }
        .card { background: #f0f9ff; border: 1px solid #e0f2fe; padding: 20px; border-radius: 18px; cursor: pointer; transition: 0.3s; }
        
        /* PAGE SWITCH LOGIC */
        .page { display: none; }
        .active-page { display: block; }

        /* BUTTONS DESIGN (LIST VIEW) */
        .list-btn { display: block; width: 100%; padding: 18px; margin: 12px 0; background: #0284c7; color: white; border: none; border-radius: 15px; font-weight: 600; font-size: 16px; cursor: pointer; text-align: left; }
        .back-btn { background: #64748b; text-align: center; }
    </style>
</head>
<body>

<div id="homePage" class="page active-page app-container">
    <div class="header">
        <div class="logo-placeholder">M</div>
        <h1>MED ED THRIVE R.A.</h1>
    </div>
    <div class="grid">
        <div class="card" onclick="showPage('surgeryPage')">🩺<br>Surgical Procedures</div>
        <div class="card" onclick="showPage('equipmentPage')">🔬<br>Medical Equipment</div>
        <div class="card">📚<br>Education Library</div>
        <div class="card">🧑‍⚕️<br>Patient Care</div>
    </div>
</div>

<div id="surgeryPage" class="page app-container">
    <h1>Surgical Procedures</h1>
    <button class="list-btn">🫀 Cardio O.T.</button>
    <button class="list-btn">🔪 Laparo O.T.</button>
    <button class="list-btn">🤰 Gynaec O.T.</button>
    <button class="list-btn">🧠 Neuro O.T.</button>
    <button class="list-btn">🦴 Ortho O.T.</button>
    <button class="list-btn back-btn" onclick="showPage('homePage')">Back to Home</button>
</div>

<div id="equipmentPage" class="page app-container">
    <h1>Medical Equipment</h1>
    <button class="list-btn">⚙️ Sterilization Zone</button>
    <button class="list-btn">🏢 Store Lobby</button>
    <button class="list-btn">💧 Washing Area</button>
    <button class="list-btn back-btn" onclick="showPage('homePage')">Back to Home</button>
</div>

<script>
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
    }
</script>

</body>
</html>
.
