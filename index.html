<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED ED THRIVE R.A.</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; text-decoration: none; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: block; font-weight: bold; }
        h1 { font-size: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>MED ED THRIVE R.A.</h1>
    <div class="grid" id="main-menu">
        <div class="card" onclick="showSection('surgical')">🩺 Surgical Procedures</div>
        <div class="card" onclick="showSection('cssd')">🔬 Medical Equipment</div>
        <div class="card">📚 Education Library</div>
        <div class="card">🏥 Patient Care</div>
    </div>

    <!-- Surgical Section -->
    <div id="surgical" style="display:none;">
        <button onclick="location.reload()">⬅️ Back</button>
        <h3>Select OT</h3>
        <div class="grid">
            <div class="card">Gynec OT</div>
            <div class="card">Laparoscopic OT</div>
            <div class="card">Orthopaedic OT</div>
            <div class="card">Cardiac OT</div>
            <div class="card">Neuro OT</div>
        </div>
    </div>

    <!-- CSSD Section -->
    <div id="cssd" style="display:none;">
        <button onclick="location.reload()">⬅️ Back</button>
        <h3>CSSD Department</h3>
        <div class="grid">
            <div class="card">Sterilization</div>
            <div class="card">Store</div>
            <div class="card">Washing Area</div>
            <div class="card">Sterilization Zone</div>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
