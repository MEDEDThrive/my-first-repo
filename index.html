<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MED ED THRIVE R.A.</title>
    <style>
        /* [PURANA CSS YAHIN RAKHA HAI] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f1f5f9; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; background: #ffffff; border-radius: 28px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 25px; }
        .card { background: #f0f9ff; border: 1px solid #e0f2fe; padding: 20px; border-radius: 18px; text-align: center; cursor: pointer; }
        
        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; width: 90%; max-width: 400px; border-radius: 20px; text-align: center; }
        .btn-sub { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #0284c7; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>MED ED THRIVE R.A.</h1></div>

    <div class="grid">
        <div class="card" onclick="showModal('modalSurgical')">🩺<br>Surgical Procedures</div>
        <div class="card" onclick="showModal('modalEquipment')">🔬<br>Medical Equipment</div>
        <div class="card">📚<br>Education Library</div>
        <div class="card">🧑‍⚕️<br>Patient Care</div>
    </div>
</div>

<div id="modalSurgical" class="modal">
    <div class="modal-content">
        <h3>Surgical Procedures</h3>
        <button class="btn-sub" onclick="alert('Details for Gynec')">Gynec</button>
        <button class="btn-sub" onclick="alert('Details for Laparo')">Laparo</button>
        <button class="btn-sub" onclick="alert('Details for Neuro')">Neuro</button>
        <button class="btn-sub" onclick="alert('Details for Ortho')">Ortho</button>
        <button class="btn-sub" onclick="alert('Details for Cardiac')">Cardiac</button>
        <button class="btn-sub" style="background:#64748b" onclick="closeModal('modalSurgical')">Close</button>
    </div>
</div>

<div id="modalEquipment" class="modal">
    <div class="modal-content">
        <h3>Medical Equipment</h3>
        <button class="btn-sub" onclick="showSterilization()">Sterilization Zone</button>
        <button class="btn-sub">Store Lobby</button>
        <button class="btn-sub">Washing Area</button>
        <button class="btn-sub" style="background:#64748b" onclick="closeModal('modalEquipment')">Close</button>
    </div>
</div>

<script>
    function showModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function showSterilization() {
        alert("Sterilization Menu: \n1. Autoclave \n2. ETO Machine \n3. Ultrasonic Machine");
    }
</script>

</body>
</html>
